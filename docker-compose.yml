version: '3.8'

services:
  nanoclaw-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nanoclaw-api
    ports:
      - "${API_PORT:-3456}:3456"
    environment:
      - NODE_ENV=production
      - API_PORT=3456
      - API_HOST=0.0.0.0
      - API_ONLY=true
      # - NANOCLAW_API_KEY=your-secret-key  # 取消注释并设置密钥
    volumes:
      - ./data:/app/data
      - ./groups:/app/groups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
